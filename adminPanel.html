<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="adminCSS.css">
    </head>

    <body>

        <div>
            ADMIN
        </div>

        <form id="productForm">
            <input type="text" id="name" placeholder="enter product name">
            <input type="text" id="description" placeholder="enter product description">
            <input type="text" id="price" placeholder="enter price e.g. 1,980">

            <fieldset>
    <legend>Variants (leave blank if not applicable)</legend>
    <label>5kg price: <input type="text" id="price5kg" placeholder="e.g. 250"></label>
    <label>10kg price: <input type="text" id="price10kg" placeholder="e.g. 480"></label>
    <label>25kg price: <input type="text" id="price25kg" placeholder="e.g. 1150"></label>
    <label>50kg price: <input type="text" id="price50kg" placeholder="e.g. 2200"></label>
</fieldset>

            <div class="upload-box">
                <input type="file" id="file" hidden>
                <label for="file" class="upload-label">
                    Click to upload a file
                </label>
                <span id="file-name">No file selected</span>
            </div>

            <button type="submit">Add Product</button>
        </form>

        <div id="adminList"></div>

        <script src="adminJS.js"></script>
    </body>
</html>
